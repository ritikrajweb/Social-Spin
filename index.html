    <style>
        /* ==========================================
           1. CORE VARIABLES & THEMING
        ========================================== */
        :root {
            --bg-base: #090a0f;
            --surface-card: #13151f;
            --surface-raised: #1c1f2e;
            --border-highlight: rgba(255, 255, 255, 0.08);
            --border-shadow: rgba(0, 0, 0, 0.5);
            --text-main: #f0f2f8;
            --text-muted: #8b8e9e;
            --accent-primary: #00d4ff; 
        }

        /* Phase-based color shifts for psychological tension */
        body.phase-2 { --accent-primary: #9d4edd; } 
        body.phase-3 { --accent-primary: #ff2a5f; } 
        body.phase-4 { --accent-primary: #ff3b3b; } 

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Rajdhani', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        html, body {
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: var(--bg-base); 
            color: var(--text-main);
            background-image: radial-gradient(circle at 50% 0%, #13151f 0%, var(--bg-base) 80%);
            transition: background-color 0.4s ease;
        }

        /* ==========================================
           2. LAYOUT & SCREENS
        ========================================== */
        .app-container { 
            width: 100%; 
            height: 100vh; 
            height: 100dvh; /* Adapts to mobile browser bars */
            position: relative; 
            overflow: hidden; 
        }
        
        .screen { 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 20px; 
            padding-bottom: 90px; 
            transition: opacity 0.3s ease, transform 0.3s ease; 
        }
        
        .screen.hidden { 
            opacity: 0; 
            pointer-events: none; 
            transform: scale(0.96); 
        }

        .screen-inner {
            margin: auto; 
            width: 100%; 
            max-width: 420px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            position: relative;
        }

        /* ==========================================
           3. LOBBY UI COMPONENTS
        ========================================== */
        .logo { 
            font-size: clamp(3rem, 10vw, 4rem); 
            font-weight: 800; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            color: var(--text-main); 
            margin-bottom: 25px; 
            text-align: center; 
            line-height: 1; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.8); 
        }
        
        .material-card {
            background: linear-gradient(145deg, var(--surface-card), #0d0f16);
            border-top: 1px solid var(--border-highlight); 
            border-left: 1px solid var(--border-highlight);
            border-right: 1px solid var(--border-shadow); 
            border-bottom: 1px solid var(--border-shadow);
            border-radius: 20px; 
            padding: 25px 20px; 
            width: 100%;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }

        .mode-selector { 
            display: flex; 
            background: #07080b; 
            border-radius: 12px; 
            padding: 5px; 
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.5); 
        }
        
        .mode-btn { 
            flex: 1; 
            padding: 12px; 
            background: transparent; 
            border: none; 
            color: var(--text-muted); 
            border-radius: 8px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s; 
            font-size: 0.95rem; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        .mode-btn.active { 
            background: var(--surface-raised); 
            color: var(--text-main); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.4); 
        }

        .input-group { 
            display: flex; 
            gap: 10px; 
        }
        
        input[type="text"] {
            flex-grow: 1; 
            padding: 14px 16px; 
            border-radius: 12px; 
            border: 1px solid transparent; 
            background: #07080b; 
            color: var(--text-main); 
            font-size: 1.1rem; 
            font-weight: 600; 
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.5); 
            transition: all 0.2s;
        }
        
        input[type="text"]:focus { 
            outline: none; 
            border-color: var(--accent-primary); 
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.5), 0 0 12px rgba(0,212,255,0.1); 
        }
        
        .btn { 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 800; 
            font-size: 1.1rem; 
            cursor: pointer; 
            transition: transform 0.1s, box-shadow 0.2s; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        
        .btn-add { 
            background: var(--surface-raised); 
            color: var(--text-main); 
            width: 60px; 
            font-size: 1.5rem; 
            border-top: 1px solid var(--border-highlight); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        
        .btn-add:active { 
            transform: translateY(2px); 
            box-shadow: 0 1px 4px rgba(0,0,0,0.3); 
        }
        
        .btn-primary { 
            background: linear-gradient(135deg, var(--text-main), #b8bbc6); 
            color: var(--bg-base); 
            width: 100%; 
            box-shadow: 0 6px 15px rgba(255,255,255,0.1); 
        }
        
        .btn-primary:active { 
            transform: translateY(2px); 
            box-shadow: 0 2px 8px rgba(255,255,255,0.1); 
        }
        
        .btn-primary:disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
            background: var(--surface-raised); 
            color: var(--text-muted); 
        }
        
        #player-list { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px; 
            min-height: 44px; 
        }
        
        .player-tag { 
            background: #07080b; 
            border: 1px solid var(--surface-raised); 
            padding: 8px 14px; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 1.05rem; 
            cursor: pointer; 
            color: var(--text-main); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .player-tag:hover { 
            border-color: #ff2a5f; 
            color: #ff2a5f; 
            text-decoration: line-through; 
        }

        /* ==========================================
           4. PWA TOAST & FLOATING ELEMENTS
        ========================================== */
        .pwa-toast {
            position: fixed; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%) translateY(150%);
            width: calc(100% - 40px); 
            max-width: 380px; 
            background: var(--surface-card);
            border: 1px solid var(--accent-primary); 
            border-radius: 16px; 
            padding: 18px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); 
            z-index: 5000;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; 
            align-items: center; 
            gap: 15px;
        }
        
        .pwa-toast.visible { 
            transform: translateX(-50%) translateY(0); 
        }

        .pwa-icon { 
            width: 45px; 
            height: 45px; 
            background: var(--bg-base); 
            border-radius: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--accent-primary); 
            font-weight: 800; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .pwa-text { flex: 1; }
        .pwa-text h4 { font-size: 1rem; color: var(--text-main); margin-bottom: 2px; }
        .pwa-text p { font-size: 0.8rem; color: var(--text-muted); }

        .pwa-btn { 
            background: var(--accent-primary); 
            color: var(--bg-base); 
            border: none; 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            cursor: pointer; 
            white-space: nowrap; 
        }
        
        .pwa-close { 
            color: var(--text-muted); 
            background: none; 
            border: none; 
            font-size: 1.2rem; 
            cursor: pointer; 
            padding: 0 5px; 
        }

        .watermark-container {
            position: fixed; 
            bottom: 25px; 
            left: 20px; 
            z-index: 10;
            pointer-events: none; 
            transition: opacity 0.3s ease;
        }
        
        .watermark { 
            font-size: 0.8rem; 
            letter-spacing: 3px; 
            color: rgba(255,255,255,0.25); 
            font-weight: 700; 
            text-transform: uppercase; 
        }

        .fab-feedback {
            position: fixed; 
            bottom: 20px; 
            right: 20px;
            background: linear-gradient(135deg, #25D366, #128C7E); 
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 50px; 
            padding: 12px 18px;
            display: flex; 
            align-items: center; 
            gap: 8px;
            font-weight: 700; 
            font-size: 0.95rem; 
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4); 
            cursor: pointer;
            z-index: 999; 
            transition: transform 0.2s, opacity 0.3s ease;
        }
        
        .fab-feedback:active { transform: scale(0.95); }

        .btn-back {
            position: absolute; 
            top: 0px; 
            left: 0px;
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--border-highlight);
            color: var(--text-main); 
            padding: 8px 16px; 
            border-radius: 20px;
            display: flex; 
            align-items: center; 
            gap: 6px;
            font-weight: 700; 
            font-size: 0.9rem; 
            cursor: pointer;
            z-index: 50; 
            transition: background 0.2s; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
        }
        
        .btn-back:active { transform: scale(0.95); }

        @media (max-height: 500px) {
            .watermark-container, .fab-feedback { opacity: 0; pointer-events: none; }
            .screen { padding-bottom: 20px; } 
        }

        /* ==========================================
           5. ARENA PHYSICS ENGINE UI
        ========================================== */
        .arena-wrapper { 
            position: relative; 
            width: 100%; 
            max-width: 380px; 
            aspect-ratio: 1/1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: auto; 
            margin-top: 20px;
        }
        
        .arena-ring { 
            position: absolute; 
            width: 85%; 
            height: 85%; 
            border-radius: 50%; 
            background: radial-gradient(circle at 50% 50%, #0d0f16 0%, #07080b 100%); 
            border-top: 1px solid var(--border-highlight); 
            border-bottom: 1px solid var(--border-shadow); 
            box-shadow: inset 0 10px 30px rgba(0,0,0,0.8), 0 10px 25px rgba(0,0,0,0.5); 
        }
        
        .arena-glow { 
            position: absolute; 
            width: 85%; 
            height: 85%; 
            border-radius: 50%; 
            box-shadow: 0 0 40px var(--accent-primary); 
            opacity: 0.15; 
            transition: box-shadow 0.4s, opacity 0.4s; 
        }
        
        .bottle-container { 
            width: 14%; 
            height: 44%; 
            position: absolute; 
            cursor: grab; 
            z-index: 5;
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            transform-origin: center center; 
            will-change: transform; 
        }
        
        .bottle-svg { 
            width: 100%; 
            height: 100%; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8)); 
        }

        .player-node { 
            position: absolute; 
            font-size: clamp(0.9rem, 3vw, 1.1rem); 
            font-weight: 700; 
            padding: 10px 16px; 
            border-radius: 12px; 
            background: linear-gradient(145deg, var(--surface-raised), var(--surface-card)); 
            border-top: 1px solid var(--border-highlight); 
            border-bottom: 1px solid var(--border-shadow);
            transition: transform 0.3s ease, color 0.3s ease; 
            z-index: 2; 
            color: var(--text-muted); 
            transform: translate(-50%, -50%); 
            text-transform: capitalize; 
            will-change: transform;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); 
            white-space: nowrap;
        }
        
        .player-node.glowing { 
            color: var(--text-main); 
            border-color: var(--accent-primary); 
            box-shadow: 0 0 15px rgba(0,212,255,0.2); 
        }
        
        .player-node.selected { 
            transform: translate(-50%, -50%) scale(1.3); 
            color: var(--bg-base); 
            background: linear-gradient(135deg, var(--text-main), #b8bbc6); 
            z-index: 10; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }

        .hud-status { 
            text-align: center; 
            width: 100%; 
            z-index: 10; 
            margin-top: 40px;
        }
        
        .hud-phase { 
            font-weight: 800; 
            font-size: clamp(1.1rem, 4vw, 1.3rem); 
            letter-spacing: 5px; 
            color: var(--accent-primary); 
            text-transform: uppercase; 
            transition: color 0.4s; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        .hud-curse { 
            margin-top: 8px; 
            display: inline-block; 
            font-size: 0.85rem; 
            border: 1px solid var(--accent-primary); 
            color: var(--accent-primary); 
            background: rgba(0,0,0,0.4); 
            padding: 4px 14px; 
            border-radius: 8px; 
            font-weight: 700; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            display: none; 
        }

        /* ==========================================
           6. TENSION MODAL ENGINE
        ========================================== */
        .modal-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(5, 6, 8, 0.95); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            opacity: 0; 
            pointer-events: none; 
            transition: opacity 0.3s; 
            z-index: 2000; 
            overflow-y: auto; 
            padding: 20px;
        }
        
        .modal-overlay.visible { 
            opacity: 1; 
            pointer-events: auto; 
        }
        
        .modal-content { 
            width: 100%; 
            max-width: 420px; 
            transform: scale(0.95); 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            padding: 35px 25px; 
            text-align: center; 
            margin: auto;
        }
        
        .modal-overlay.visible .modal-content { 
            transform: scale(1); 
        }

        .tension-state { 
            animation: pulseScale 1.2s infinite; 
            border-color: var(--accent-primary); 
        }
        
        @keyframes pulseScale { 
            0%, 100% { transform: scale(1); } 
            50% { transform: scale(1.02); box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(0,212,255,0.1); } 
        }

        .modal-header { 
            font-size: 0.95rem; 
            color: var(--text-muted); 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 800; 
            margin-bottom: 12px; 
        }
        
        .modal-title { 
            font-size: clamp(2rem, 6vw, 2.4rem); 
            font-weight: 800; 
            margin-bottom: 24px; 
            color: var(--text-main); 
            text-transform: uppercase; 
            line-height: 1.1; 
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
        }
        
        .modal-task { 
            font-size: clamp(1.2rem, 4vw, 1.35rem); 
            line-height: 1.45; 
            color: var(--text-main); 
            font-weight: 500; 
            min-height: 85px; 
        }
        
        .loading-text { 
            font-size: 1.15rem; 
            font-style: italic; 
            color: var(--text-muted); 
            animation: pulseOpacity 1.5s infinite; 
        }
        
        @keyframes pulseOpacity { 
            0%, 100% { opacity: 0.4; } 
            50% { opacity: 1; } 
        }

        .highlight-target { 
            color: var(--accent-primary); 
            font-weight: 800; 
            text-transform: capitalize; 
        }
        
        .highlight-secondary { 
            color: var(--text-main); 
            font-weight: 800; 
            border-bottom: 2px solid var(--surface-raised); 
            padding-bottom: 2px;
        }

        .modal-actions { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-top: 35px; 
        }
        
        .modal-actions.full { 
            grid-template-columns: 1fr; 
        }
        
        .btn-modal { 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 800; 
            font-size: clamp(0.95rem, 3vw, 1.05rem); 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: transform 0.1s, box-shadow 0.2s;
        }
        
        .btn-truth { 
            background: linear-gradient(145deg, var(--surface-raised), var(--surface-card)); 
            border-top: 1px solid var(--border-highlight); 
            color: var(--text-main); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        .btn-truth:active { 
            transform: translateY(2px); 
            box-shadow: 0 1px 4px rgba(0,0,0,0.3); 
        }
        
        .btn-dare { 
            background: linear-gradient(135deg, var(--text-main), #b8bbc6); 
            color: var(--bg-base); 
            box-shadow: 0 6px 15px rgba(255,255,255,0.1); 
        }
        
        .btn-dare:active { transform: translateY(2px); }
        
        .btn-chicken { 
            background: #07080b; 
            color: #ff2a5f; 
            border: 1px solid rgba(255, 42, 95, 0.4); 
        }
        
        .btn-share { 
            grid-column: 1 / -1; 
            background: var(--surface-raised); 
            color: var(--text-main); 
            margin-top: 5px; 
            font-size: 0.95rem; 
            border-top: 1px solid var(--border-highlight); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px;
        }
    </style>
</head>

         * Ensures 80%, 60%, 40% decay logic so players don't get repeats.
         */
        const CognitiveEngine = {
            currentSession: 1,
            
            init: () => {
                let memory = JSON.parse(localStorage.getItem('arena_cognitive_vault') || '{"session":0, "history":{}}');
                memory.session += 1;
                localStorage.setItem('arena_cognitive_vault', JSON.stringify(memory));
                CognitiveEngine.currentSession = memory.session;
            },
            
            normalize: (name) => name.toLowerCase().replace(/[^a-z0-9]/g, ''),
            
            getIndex: (player, phase, type, length) => {
                let memory = JSON.parse(localStorage.getItem('arena_cognitive_vault'));
                let pKey = CognitiveEngine.normalize(player);
                let weights = [];
                let totalWeight = 0;

                // Loop through all questions to calculate probability weights
                for(let i=0; i < length; i++) {
                    let key = `${pKey}_${phase}_${type}_${i}`;
                    let lastSeen = memory.history[key];
                    let weight = 1.0; // Default fresh

                    if (lastSeen !== undefined) {
                        let age = CognitiveEngine.currentSession - lastSeen;
                        if (age === 0) weight = 0.0;       // 0% chance this session
                        else if (age === 1) weight = 0.2;  // 20% chance (1 game ago)
                        else if (age === 2) weight = 0.4;  // 40% chance (2 games ago)
                        else if (age === 3) weight = 0.6;  // 60% chance (3 games ago)
                        else if (age === 4) weight = 0.8;  // 80% chance (4 games ago)
                        else weight = 1.0;                 // 100% chance (5+ games ago)
                    }

                    weights.push(weight);
                    totalWeight += weight;
                }

                // Fallback: If totalWeight is 0 (all seen this session), pick randomly
                if(totalWeight === 0) return Math.floor(Math.random() * length);

                // Weighted Selection Logic
                let random = Math.random() * totalWeight;
                let sum = 0;
                for(let i=0; i < length; i++) {
                    sum += weights[i];
                    if(random <= sum) return i;
                }
                return 0;

                    "Tumhari life mein ek aisa kaunsa decision tha jiska regret tumhe abhi tak andhi raat mein sone nahi deta?",

                dare: [

                    "Give your phone to {PlayerB}. They get to search one specific word (e.g. 'cheat', 'liar', 'sorry') in your WhatsApp search bar and read the context of the first result.",

                    "Tumhe exactly 1 minute milta hai apne phone pe kuch bhi permanently delete karne ke liye (pics, chats). Uske baad phone {PlayerB} ke haath mein jayega 30 seconds ke liye.",
                    "Apne bank account / UPI balance ka screenshot lo aur dosto ko dikhao, no matter kitna kam ya zyada ho.",
                    "Agle round tak tumhe apni aakhein band karni hain aur jab tak game chal raha hai, silently apne past actions pe reflect karna hai.",
                    "Group Point: Apna phone apne left wale player ko do. Wo tumhare notes app mein jayega aur ek random note loud padh kar sunayega.",
                    "{PlayerC} ke paas jao, unhe exactly 15 seconds tak zor se hug karo, aur kaho 'Mujhe lagta hai tum tut rahe ho aur tum thik nahi ho'.",
                    "Apne phone ke aakhri 5 screenshots dikhao bina kisi explanation ke. Agar unme kuch sensitive hai, toh penalty bhugatna padega.",
                    "Apni life ki sabse dark memory ko exactly 2 sentences mein summarize karke batao.",
                    "Tumhe kisi bhi relative ko text karna hai: 'I have messed up big time, need to talk.' aur unka reaction aane tak silent rehna hai.",
                    "{PlayerB} ko permission hai ki wo tumhari kisi social media account se ek cryptic aur sad status daale jo agle 2 ghante tak nahi hatega.",
                    "Group Point: 1, 2, 3 pe point karo us insaan ki taraf jispe tum least depend karoge agar tum kisi life-or-death crisis mein phas jao.",
                    "Apne phone ke camera se apni ek ro ti hui ya thaki hui shakal ki selfie lo, aur usay group chat mein permanently bhej do.",
                    "Tumhe ek truth bolna hai jisme tum accept karoge ki tumne kisi dusre insaan ko consciously hurt kiya taaki tumhari apni ego boost ho.",
                    "Apni search history kholo aur aakhri query ka deep psychological meaning derive karke batao.",
                    "{PlayerC} ko ek minute tak allow karo tumhari aakhri 10 gallery photos dekhne, aur unme se ek ko unhe directly delete karne ka right hai.",
                    "Tumhe apne dimaag mein jo sabse pehla negative thought aa raha hai, usko uncensored aur bina kisi filter ke bolna hai.",
                    "Agle 5 minutes ke liye game ki moderation {PlayerB} ko do, aur wo jo bhi deep sawaal pooche, tumhe explicitly 'haan' ya 'na' mein answer dena hai."
                ]
            }
        };

        // Name Parser for prompts (Injects PlayerB/PlayerC)
        const parsePrompt = (template, current) => {
            let targets = state.players.filter(p => p !== current).sort(() => 0.5 - Math.random());
            const pB = targets[0] || "kisi aur"; 
            const pC = targets[1] || (targets[0] ? targets[0] : "kisi aur"); 
            return template.replace(/{PlayerB}/g, `<span class="highlight-secondary">${pB}</span>`).replace(/{PlayerC}/g, `<span class="highlight-secondary">${pC}</span>`);
        };

        /** * 6. UI STATE MANAGEMENT
         * Connects the DOM to the Logic
         */
        const UI = {
            setupScreen: document.getElementById('setup-screen'), 
            gameScreen: document.getElementById('game-screen'),
            playerInput: document.getElementById('player-input'), 
            addBtn: document.getElementById('add-player-btn'), 
            playerList: document.getElementById('player-list'), 
            startBtn: document.getElementById('start-game-btn'), 
            arena: document.getElementById('arena'), 
            bottleEl: document.getElementById('bottle'), 
            modal: document.getElementById('modal'), 
            modalContent: document.getElementById('modal-content'),
            modalHeader: document.getElementById('modal-header'), 
            modalTitle: document.getElementById('modal-title'), 
            modalTask: document.getElementById('modal-task-text'), 
            modalBtns: document.getElementById('modal-buttons'), 
            levelDisplay: document.getElementById('level-display'), 
            curseBanner: document.getElementById('curse-banner'),
            modeBtns: document.querySelectorAll('.mode-btn'), 
            backToLobbyBtn: document.getElementById('back-to-lobby-btn')
        };

        let state = { players: [], nodes: [], current: null, turns: 0, mode: 'ai', spinning: false, curseCount: 0 };

        // Mode Toggler
        UI.modeBtns.forEach(btn => {
            btn.onclick = (e) => {
                UI.modeBtns.forEach(b => b.classList.remove('active')); e.target.classList.add('active');
                state.mode = e.target.dataset.mode;
            };
        });

        // Add Player Logic
        const updateRoster = () => {
            UI.playerList.innerHTML = '';
            state.players.forEach(p => {
                const tag = document.createElement('div'); tag.className = 'player-tag'; tag.textContent = p;
                tag.onclick = () => { state.players = state.players.filter(n => n !== p); updateRoster(); };
                UI.playerList.appendChild(tag);
            });
            UI.startBtn.disabled = state.players.length < 2; 
        };

        UI.addBtn.onclick = () => { 
            const name = UI.playerInput.value.trim(); 
            if (name && !state.players.includes(name)) { 
                state.players.push(name); 
                UI.playerInput.value = ''; 
                updateRoster(); 
            } 
        };
        
        UI.playerInput.onkeypress = (e) => { if (e.key === 'Enter') UI.addBtn.onclick(); };

        // Start Game
        UI.startBtn.onclick = () => {
            UI.setupScreen.classList.add('hidden'); 
            UI.gameScreen.classList.remove('hidden');
            CognitiveEngine.init(); 
            
            // FULL PLAYER ARRAY LOGGED FOR GOD-MODE ANALYTICS
            logEvent('protocol_engaged', { subjects: state.players, mode: state.mode });
            
            initArena();
        };

        // Go Back
        UI.backToLobbyBtn.onclick = () => {
            UI.gameScreen.classList.add('hidden'); 
            UI.setupScreen.classList.remove('hidden');
        };

        /** * 7. HARDWARE-ACCELERATED PHYSICS ENGINE
         * Manages layout and 60FPS spinning math
         */
        const initArena = () => {
            UI.arena.innerHTML = ''; UI.arena.appendChild(UI.bottleEl); state.nodes = [];
            const r = UI.arena.offsetWidth / 2 * 0.82; 
            const aInc = 360 / state.players.length;
            
            state.players.forEach((p, i) => {
                const rad = ((i * aInc) - 90) * (Math.PI / 180);
                const x = (UI.arena.offsetWidth / 2) + r * Math.cos(rad); 
                const y = (UI.arena.offsetHeight / 2) + r * Math.sin(rad);
                const n = document.createElement('div'); 
                n.className = 'player-node'; 
                n.textContent = p;
                n.style.left = `${x}px`; 
                n.style.top = `${y}px`; 
                UI.arena.appendChild(n); 
                state.nodes.push(n);
            });
        };

        class PhysicsBottle {
            constructor(el) { this.el = el; this.a = 0; this.v = 0; this.f = 0.992; }
            spin(vel) { if(state.spinning) return; state.spinning = true; this.v = vel; this.update(); }
            update() {
                if (Math.abs(this.v) > 0.1) {
                    this.a += this.v; this.v *= this.f; 
                    this.el.style.transform = `translate(-50%, -50%) rotate(${this.a}deg)`;
                    if (Math.random() > 0.8 && navigator.vibrate) navigator.vibrate(10); 
                    this.glow(); requestAnimationFrame(() => this.update());
                } else { this.stop(); }
            }
            glow() {
                const slice = 360 / state.players.length; 
                const norm = ((this.a % 360) + 360) % 360;
                const idx = Math.floor((norm + (slice/2)) % 360 / slice);
                state.nodes.forEach((n, i) => n.classList.toggle('glowing', i === idx));
            }
            stop() { 
                this.v = 0; state.spinning = false; 
                state.nodes.forEach(n => n.classList.remove('glowing')); 
                executeTurnLogic(); 
            }
        }
        const bottle = new PhysicsBottle(UI.bottleEl);

        // Drag to spin logic
        let drag = { s:0, on:false, l:0, t:0 };
        const dStart = (e) => { 
            if (state.spinning) return; 
            drag.on = true; 
            const r = UI.bottleEl.getBoundingClientRect(); 
            const cx = r.left + r.width/2, cy = r.top + r.height/2; 
            const ex = e.touches ? e.touches[0].clientX : e.clientX, ey = e.touches ? e.touches[0].clientY : e.clientY; 
            drag.s = Math.atan2(ey - cy, ex - cx) * (180/Math.PI); drag.l = bottle.a; drag.t = Date.now(); 
        };
        const dMove = (e) => { 
            if (!drag.on) return; 
            e.preventDefault(); 
            const r = UI.bottleEl.getBoundingClientRect(); 
            const cx = r.left + r.width/2, cy = r.top + r.height/2; 
            const ex = e.touches ? e.touches[0].clientX : e.clientX, ey = e.touches ? e.touches[0].clientY : e.clientY; 
            bottle.a = drag.l + (Math.atan2(ey - cy, ex - cx) * (180/Math.PI) - drag.s); 
            bottle.el.style.transform = `translate(-50%, -50%) rotate(${bottle.a}deg)`; bottle.glow(); 
        };
        const dEnd = () => { 
            if (!drag.on) return; 
            drag.on = false; 
            let v = (bottle.a - drag.l) / (Date.now() - drag.t || 1) * 20 + ((Math.random()>0.5?10:-10) + Math.random()*20); 
            if(Math.abs(v) < 15) v = 25; 
            bottle.spin(v); 
        };
        
        UI.bottleEl.addEventListener('mousedown', dStart); document.addEventListener('mousemove', dMove); document.addEventListener('mouseup', dEnd);
        UI.bottleEl.addEventListener('touchstart', dStart, {passive:false}); document.addEventListener('touchmove', dMove, {passive:false}); document.addEventListener('touchend', dEnd);

        /** * 8. TENSION MODAL FLOW & GOD-MODE TELEMETRY
         * The heartbeat of the game.
         */
        const getPhase = (t) => { 
            if (t <= 8) return (t % 2 === 0) ? 'l1' : 'l2'; 
            if (t > 8 && t <= 20) return (t % 3 === 0) ? 'l3' : (t % 5 === 0 ? 'l4' : 'l2'); 
            const w = t % 10; return (w <= 3) ? 'l2' : ((w <= 7) ? 'l3' : 'l4'); 
        };

        const executeTurnLogic = () => {
            state.turns++;
            const slice = 360 / state.players.length; 
            const idx = Math.floor((((bottle.a % 360) + 360) % 360 + (slice/2)) % 360 / slice);
            state.current = state.players[idx]; 
            state.nodes[idx].classList.add('selected');
            
            if(state.curseCount > 0) { state.curseCount--; if(state.curseCount === 0) UI.curseBanner.style.display = 'none'; }

            if (state.mode === 'classic') {
                showModal("CLASSIC MODE", `<span class="highlight-target">${state.current}</span>`, "Group, ask them a Truth or Dare.", `<button class="btn btn-modal btn-truth full" onclick="closeModal()">Next Turn</button>`);
                if (navigator.vibrate) navigator.vibrate([150]);
            } else {
                let phase = getPhase(state.turns); let text = "LEVEL 1: ICEBREAKER"; document.body.className = '';
                if(phase === 'l2') { document.body.classList.add('phase-2'); text = "LEVEL 2: GOSSIP"; }
                if(phase === 'l3') { document.body.classList.add('phase-3'); text = "LEVEL 3: THE EDGE"; }
                if(phase === 'l4') { document.body.classList.add('phase-4'); text = "LEVEL 4: NUCLEAR"; }
                UI.levelDisplay.textContent = text;

                showModal("TARGET LOCKED", `<span class="highlight-target">${state.current}</span>`, "Make your choice.", `<button class="btn btn-modal btn-truth" onclick="generatePrompt('truth')">Truth</button><button class="btn btn-modal btn-dare" onclick="generatePrompt('dare')">Dare</button>`);
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            }
        };

        const showModal = (h, t, task, btns) => { 
            UI.modalHeader.innerHTML = h; 
            UI.modalTitle.innerHTML = t; 
            UI.modalTask.innerHTML = task; 
            UI.modalBtns.innerHTML = btns; 
            UI.modal.classList.add('visible'); 
        };
        
        const closeModal = () => { 
            UI.modal.classList.remove('visible'); 
            state.nodes.forEach(n => n.classList.remove('selected')); 
        };

        // GOD-MODE LOGGING: Record when a task is completed
        const completeTask = () => {
            logEvent('task_completed', { player: state.current });
            closeModal();
        };

        const generatePrompt = (type) => {
            UI.modalContent.classList.add('tension-state');
            showModal("ANALYZING...", `<span class="highlight-target">${state.current}</span>`, `<span class="loading-text">Generating challenge...</span>`, "");
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 500, 100, 50, 100]);

            setTimeout(() => {
                UI.modalContent.classList.remove('tension-state');
                let phase = getPhase(state.turns); 
                let arr = DB[phase][type];
                
                // Pulls from CognitiveEngine (Decay Math)
                let freshIdx = CognitiveEngine.getIndex(state.current, phase, type, arr.length);
                let raw = arr[freshIdx];
                CognitiveEngine.logPrompt(state.current, phase, type, freshIdx);
                
                if(raw.includes("CURSE TRIGGER") || raw.includes("Group Point:")) { 
                    state.curseCount = type === 'truth' ? 3 : 5; 
                    UI.curseBanner.style.display = 'inline-block'; 
                    UI.curseBanner.textContent = raw.includes("Group Point:") ? `Group Action` : `Active Curse on ${state.current}`; 
                }
                
                let prompt = parsePrompt(raw, state.current);
                if (navigator.vibrate) navigator.vibrate([200, 100, 300]);

                // GOD-MODE LOGGING: Record exactly who got what question
                logEvent('question_asked', { 
                    target_player: state.current, 
                    question_type: type, 
                    level: phase, 
                    prompt_text: prompt.replace(/<[^>]*>?/gm, '') 
                });
                
                let btns = `
                    <button class="btn btn-modal btn-chicken" onclick="triggerPenalty()">Chicken Out</button>
                    <button class="btn btn-modal btn-dare" onclick="completeTask()">I Did It</button>
                    <button class="btn btn-modal btn-share" onclick="executeNativeShare('${prompt.replace(/<[^>]*>?/gm, '')}', '${state.current}')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                        Share
                    </button>
                `;
                showModal(`${type.toUpperCase()}`, `<span class="highlight-target">${state.current}</span>`, prompt, btns);
            }, 2500);
        };

        const triggerPenalty = () => {
            // GOD-MODE LOGGING: Record who chickened out
            logEvent('chicken_out', { coward: state.current });

            let t = state.players.filter(p => p !== state.current).sort(() => 0.5 - Math.random());
            let p = [
                `Penalty: Hand your unlocked phone to <span class="highlight-secondary">${t[0] || "someone"}</span> for 60 seconds.`, 
                `Penalty: Update your WhatsApp status to "I am the biggest coward in this group" for 2 hours.`
            ];
            showModal(`<span style="color:#ff3b3b">CHICKEN!</span>`, `PENALTY`, p[Math.floor(Math.random()*p.length)], `<button class="btn btn-modal btn-chicken full" onclick="closeModal()">Accept Fate</button>`);
            UI.modalBtns.classList.add('full'); 
            setTimeout(() => UI.modalBtns.classList.remove('full'), 500);
        };

        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then((reg) => console.log('App Engine Active'))
                .catch((err) => console.log('Engine failed', err));
            });
        }
    </script>
